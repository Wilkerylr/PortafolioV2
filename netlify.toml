# Configuración de Netlify para el frontend
[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

# Variables de entorno para producción
[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# Redirecciones para SPA (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200